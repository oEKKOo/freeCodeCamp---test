<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lightbox Viewer</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- 画廊容器 -->
    <div class="gallery">
        <img class="gallery-item" src="https://cdn.freecodecamp.org/curriculum/labs/stonehenge-thumbnail.jpg"
            alt="Stonehenge">
        <img class="gallery-item" src="https://cdn.freecodecamp.org/curriculum/labs/storm-thumbnail.jpg" alt="Storm">
        <img class="gallery-item" src="https://cdn.freecodecamp.org/curriculum/labs/trees-thumbnail.jpg" alt="Trees">
    </div>

    <!-- 灯箱模态框 -->
    <div class="lightbox">
        <button id="close-btn">&times;</button>
        <img id="lightbox-image" alt="Full size image">
    </div>

    <script src="script.js"></script>
</body>

</html>

</html>
