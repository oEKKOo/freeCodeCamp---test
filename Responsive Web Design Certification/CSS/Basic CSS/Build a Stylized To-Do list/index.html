<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Styled To-Do List</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!-- 主待办列表 -->
    <ul class="todo-list">
        <li>
            <input type="checkbox" id="task1">
            <label for="task1">完成前端实验作业</label>
            <ul class="sub-item">
                <li><a href="https://www.example.com" class="sub-item-link" target="_blank">查看实验要求</a></li>
            </ul>
        </li>

        <li>
            <input type="checkbox" id="task2">
            <label for="task2">学习CSS选择器</label>
            <ul class="sub-item">
                <li><a href="https://www.example.com" class="sub-item-link" target="_blank">CSS教程文档</a></li>
            </ul>
        </li>

        <li>
            <input type="checkbox" id="task3">
            <label for="task3">整理代码笔记</label>
            <ul class="sub-item">
                <li><a href="https://www.example.com" class="sub-item-link" target="_blank">笔记工具</a></li>
            </ul>
        </li>

        <li>
            <input type="checkbox" id="task4">
            <label for="task4">练习响应式布局</label>
            <ul class="sub-item">
                <li><a href="https://www.example.com" class="sub-item-link" target="_blank">布局案例参考</a></li>
            </ul>
        </li>
    </ul>
</body>

</html>
