<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Post Card</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="blog-post-card">
        <img src="https://cdn.freecodecamp.org/curriculum/labs/cover-photo.jpg"
            alt="Scenic landscape with mountains and lake" class="post-img">
        <div class="post-content">
            <h2 class="post-title">Exploring Nature's Beauty</h2>
            <p class="post-excerpt">Discover the most breathtaking natural landscapes around the world and learn how to
                connect with the great outdoors.</p>
            <a href="#" class="read-more">Read More</a>
        </div>
    </div>
</body>

</html>
