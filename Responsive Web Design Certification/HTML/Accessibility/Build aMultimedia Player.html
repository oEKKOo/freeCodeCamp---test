<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multimedia Player</title>
</head>

<body>

    <h1>Multimedia Player</h1>

    <section>
        <h2>Sailing Away</h2>
        <audio controls aria-label="Sailing Away audio track">
            <source src="https://cdn.freecodecamp.org/curriculum/js-music-player/sailing-away.mp3" type="audio/mpeg">

    </section>

    <section>
        <h2>What is the map() Method?</h2>
        <video controls width="600" aria-label="JavaScript map method tutorial video">
            <source src="https://cdn.freecodecamp.org/curriculum/labs/what-is-the-map-method-and-how-does-it-work.mp4"
                type="video/mp4">
            <track src="https://cdn.freecodecamp.org/curriculum/labs/what-is-the-map-method-and-how-does-it-work.vtt"
                kind="subtitles" srclang="en" label="English">
        </video>
    </section>

    <section>
        <h2>Transcript</h2>
        <p>The map method creates a new array by calling a function on every element in the original array. It does not
            change the original array. You can use it to transform data easily in JavaScript.</p>
    </section>

</body>

</html>
