<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Photography Exhibit</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="p-8">
    <!-- 网格容器：grid、固定三列、gap统一间距 -->
    <div class="main-container grid grid-cols-3 gap-6">
        <!-- 卡片1 -->
        <div class="card rounded-lg p-4 border">
            <img src="https://cdn.freecodecamp.org/curriculum/labs/colosseo.jpg" alt="Colosseum ancient architecture"
                class="rounded-md w-full">
            <h3 class="subheading font-bold text-xl mt-3">Ancient Colosseum</h3>
            <p class="description text-sm mt-2">Historic landmark captured under warm golden sunset light in Rome.</p>
        </div>
        <!-- 卡片2 -->
        <div class="card rounded-lg p-4 border">
            <img src="https://cdn.freecodecamp.org/curriculum/labs/alps.jpg" alt="Alps mountain range"
                class="rounded-md w-full">
            <h3 class="subheading font-semibold text-xl mt-3">Alpine Mountain Range</h3>
            <p class="description text-sm mt-2">Snow-capped peaks surrounded by fresh green alpine meadow scenery.</p>
        </div>
        <!-- 卡片3 -->
        <div class="card rounded-lg p-4 border">
            <img src="https://cdn.freecodecamp.org/curriculum/labs/sea.jpg" alt="Calm ocean sea view"
                class="rounded-md w-full">
            <h3 class="subheading font-bold text-xl mt-3">Tranquil Ocean Coast</h3>
            <p class="description text-sm mt-2">Clear blue seawater meeting soft sandy shore under bright daylight.</p>
        </div>
    </div>
</body>

</html>
